<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .game-card { transition: all 0.2s; }
    .game-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-6xl mx-auto p-8">
    <!-- Header - looks like a boring productivity tool -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Productivity Dashboard</h1>
        <p class="text-zinc-500">Quick tools • Notes • Focus mode</p>
      </div>
      <div class="text-xs text-zinc-500">Press Ctrl + Shift + I for advanced tools</div>
    </div>

    <!-- Fake innocent content (makes it look legit) -->
    <div class="grid grid-cols-3 gap-6 mb-12">
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h3 class="font-semibold mb-2">Today's Tasks</h3>
        <ul class="space-y-2 text-sm">
          <li class="flex items-center gap-2"><span class="text-green-500">✓</span> Finish report</li>
          <li class="flex items-center gap-2"><span class="text-amber-500">○</span> Review notes</li>
          <li class="flex items-center gap-2"><span class="text-amber-500">○</span> Schedule meeting</li>
        </ul>
      </div>
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h3 class="font-semibold mb-2">Quick Links</h3>
        <div class="text-sm text-zinc-400 space-y-1">
          <a href="#" class="hover:text-white">Email</a><br>
          <a href="#" class="hover:text-white">Drive</a><br>
          <a href="#" class="hover:text-white">Calendar</a>
        </div>
      </div>
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h3 class="font-semibold mb-2">Focus Timer</h3>
        <div class="text-5xl font-mono text-center text-zinc-400">25:00</div>
      </div>
    </div>

    <!-- Hidden Game Launcher -->
    <div id="gameLauncher" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-lime-400">.io Stealth Launcher</h2>
        <button onclick="hideLauncher()" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm">
          Hide Launcher
        </button>
      </div>
      
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gameGrid">
        <!-- Games populated by JavaScript below -->
      </div>
    </div>
  </div>

  <script>
    // === EDITABLE LIST OF .IO GAMES (40+ popular ones - 2026) ===
    const games = [
      { name: "Agar.io", url: "https://agar.io/" },
      { name: "Slither.io", url: "https://slither.io/" },
      { name: "Diep.io", url: "https://diep.io/" },
      { name: "Deeeep.io", url: "https://deeeep.io/" },
      { name: "Mope.io", url: "https://mope.io/" },
      { name: "Krunker.io", url: "https://krunker.io/" },
      { name: "Bloxd.io", url: "https://bloxd.io/" },
      { name: "Hole.io", url: "https://hole.io/" },
      { name: "Skribbl.io", url: "https://skribbl.io/" },
      { name: "Moomoo.io", url: "https://moomoo.io/" },
      { name: "Arras.io", url: "https://arras.io/" },
      { name: "Evowars.io", url: "https://evowars.io/" },
      { name: "BuildRoyale.io", url: "https://buildroyale.io/" },
      { name: "Hexanaut.io", url: "https://hexanaut.io/" },
      { name: "Drednot.io", url: "https://drednot.io/" },
      { name: "Aquapark.io", url: "https://aquapark.io/" },
      { name: "Bonk.io", url: "https://bonk.io/" },
      { name: "Braains.io", url: "https://braains.io/" },
      { name: "Curvefever.io", url: "https://curvefever.io/" },
      { name: "Deadshot.io", url: "https://deadshot.io/" },
      { name: "Digdig.io", url: "https://digdig.io/" },
      { name: "EvoWorld.io", url: "https://evoworld.io/" },
      { name: "Florr.io", url: "https://florr.io/" },
      { name: "Generals.io", url: "https://generals.io/" },
      { name: "Gota.io", url: "https://gota.io/" },
      { name: "Hordes.io", url: "https://hordes.io/" },
      { name: "Kartwars.io", url: "https://kartwars.io/" },
      { name: "LittleBigSnake.io", url: "https://littlebigsnake.io/" },
      { name: "Lordz.io", url: "https://lordz.io/" },
      { name: "Narwhale.io", url: "https://narwhale.io/" },
      { name: "Oceanar.io", url: "https://oceanar.io/" },
      { name: "Openfront.io", url: "https://openfront.io/" },
      { name: "Starblast.io", url: "https://starblast.io/" },
      { name: "Wings.io", url: "https://wings.io/" },
      { name: "ZombsRoyale.io", url: "https://zombsroyale.io/" },
      { name: "Surviv.io", url: "https://surviv.io/" },
      { name: "Smash Karts", url: "https://smashkarts.io/" },
      { name: "Shell Shockers", url: "https://shellshock.io/" },
      { name: "Paper.io 2", url: "https://paperio2.com/" },
      { name: "Tanks 3D", url: "https://tanks3d.io/" },
      { name: "Veck.io", url: "https://veck.io/" }
    ];

    // Populate the grid
    function populateGames() {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card bg-zinc-900 rounded-2xl p-5 cursor-pointer border border-zinc-800 hover:border-lime-500';
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <div class="font-semibold text-lg">${game.name}</div>
              <div class="text-xs text-zinc-500 mt-1">${game.url}</div>
            </div>
            <button onclick="launchGame('${game.url}'); event.stopImmediatePropagation();"
                    class="px-5 py-2 bg-lime-500 hover:bg-lime-600 text-black font-semibold rounded-xl text-sm">
              Launch Stealthily
            </button>
          </div>
        `;
        card.onclick = () => launchGame(game.url);
        grid.appendChild(card);
      });
    }

    // Launch in new undetectable tab
    function launchGame(url) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    // Toggle launcher with hotkey
    function toggleLauncher() {
      const launcher = document.getElementById('gameLauncher');
      launcher.classList.toggle('hidden');
    }

    function hideLauncher() {
      document.getElementById('gameLauncher').classList.add('hidden');
    }

    // Hotkey listener: Ctrl + Shift + I
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
        e.preventDefault();
        toggleLauncher();
      }
    });

    // Tailwind script + init
    document.addEventListener('DOMContentLoaded', () => {
      populateGames();
      // Optional: auto-hide after 30 seconds of inactivity (extra stealth)
      let timeout;
      document.addEventListener('mousemove', () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          if (!document.getElementById('gameLauncher').classList.contains('hidden')) {
            // hideLauncher(); // uncomment if you want auto-hide
          }
        }, 30000);
      });
    });
  </script>
</body>
</html>
