<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .game-card { transition: all 0.2s; }
    .game-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-6xl mx-auto p-8">
    <!-- Boring disguise header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Productivity Dashboard</h1>
        <p class="text-zinc-500">Quick tools • Notes • Focus mode</p>
      </div>
      <div class="text-xs text-zinc-500">Press Ctrl + Shift + I for advanced settings</div>
    </div>

    <!-- Fake content to look legitimate -->
    <div class="grid grid-cols-3 gap-6 mb-12">
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h3 class="font-semibold mb-2">Today's Tasks</h3>
        <ul class="space-y-2 text-sm">
          <li class="flex items-center gap-2"><span class="text-green-500">✓</span> Review notes</li>
          <li class="flex items-center gap-2"><span class="text-amber-500">○</span> Finish assignment</li>
          <li class="flex items-center gap-2"><span class="text-amber-500">○</span> Schedule study block</li>
        </ul>
      </div>
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h3 class="font-semibold mb-2">Quick Links</h3>
        <div class="text-sm text-zinc-400 space-y-1">
          <a href="#" class="hover:text-white">Email</a><br>
          <a href="#" class="hover:text-white">Drive</a><br>
          <a href="#" class="hover:text-white">Calendar</a>
        </div>
      </div>
      <div class="bg-zinc-900 rounded-2xl p-6">
        <h3 class="font-semibold mb-2">Focus Timer</h3>
        <div class="text-5xl font-mono text-center text-zinc-400">25:00</div>
      </div>
    </div>

    <!-- Hidden .io Games Section -->
    <div id="gameLauncher" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-lime-400">Advanced Tools</h2>
        <button onclick="hideLauncher()" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm">
          Close Panel
        </button>
      </div>
      
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gameGrid">
        <!-- Games populated dynamically -->
      </div>
    </div>
  </div>

  <script>
    // 2026-relevant .io games (classics + currently popular ones)
    const games = [
      { name: "Agar.io", url: "https://agar.io/" },
      { name: "Slither.io", url: "https://slither.io/" },
      { name: "Krunker.io", url: "https://krunker.io/" },
      { name: "Shell Shockers", url: "https://shellshock.io/" },
      { name: "Smash Karts", url: "https://smashkarts.io/" },
      { name: "Deadshot.io", url: "https://deadshot.io/" },
      { name: "Bloxd.io", url: "https://bloxd.io/" },
      { name: "Venge.io", url: "https://venge.io/" },
      { name: "Kour.io", url: "https://kour.io/" },
      { name: "LOLBeans.io", url: "https://lolbeans.io/" },
      { name: "Paper.io 2", url: "https://paperio2.com/" },
      { name: "Surviv.io", url: "https://surviv.io/" },
      { name: "ZombsRoyale.io", url: "https://zombsroyale.io/" },
      { name: "Moomoo.io", url: "https://moomoo.io/" },
      { name: "Diep.io", url: "https://diep.io/" },
      { name: "Deeeep.io", url: "https://deeeep.io/" },
      { name: "Hole.io", url: "https://hole.io/" },
      { name: "Skribbl.io", url: "https://skribbl.io/" },
      { name: "1v1.LOL", url: "https://1v1.lol/" },
      { name: "BuildRoyale.io", url: "https://buildroyale.io/" }
    ];

    function populateGames() {
      const grid = document.getElementById('gameGrid');
      grid.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card bg-zinc-900 rounded-2xl p-5 cursor-pointer border border-zinc-800 hover:border-lime-500';
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <div class="font-semibold text-lg">${game.name}</div>
              <div class="text-xs text-zinc-500 mt-1 truncate max-w-[180px]">${game.url}</div>
            </div>
            <button class="px-5 py-2 bg-lime-500 hover:bg-lime-600 text-black font-semibold rounded-xl text-sm">
              Launch
            </button>
          </div>
        `;
        // Click anywhere on card or button launches stealthily
        card.onclick = (e) => {
          e.stopPropagation();
          launchStealth(game.url);
        };
        grid.appendChild(card);
      });
    }

    // Stealth launch: about:blank → navigate (your requested method)
    function launchStealth(url) {
      const blankTab = window.open('about:blank', '_blank', 'noopener,noreferrer');
      if (blankTab) {
        try {
          // Tiny random delay (20–100 ms) to feel less robotic + reduce detection chance
          setTimeout(() => {
            blankTab.location.href = url;
            blankTab.blur();       // Try to defocus new tab
            window.focus();        // Bring launcher back to front
          }, Math.random() * 80 + 20);
        } catch (err) {
          // Rare cross-origin/security block fallback
          blankTab.close();
          const fallback = window.open(url, '_blank', 'noopener,noreferrer');
          if (fallback) {
            fallback.blur();
            window.focus();
          }
        }
      } else {
        // Popup blocked → direct fallback
        const direct = window.open(url, '_blank', 'noopener,noreferrer');
        if (direct) {
          direct.blur();
          window.focus();
        }
      }
    }

    function hideLauncher() {
      document.getElementById('gameLauncher').classList.add('hidden');
    }

    function toggleLauncher() {
      document.getElementById('gameLauncher').classList.toggle('hidden');
    }

    // Stealth hotkey: Ctrl + Shift + I
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') {
        e.preventDefault();
        toggleLauncher();
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      populateGames();
    });
  </script>
</body>
</html>
